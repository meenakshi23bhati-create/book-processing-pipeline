services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_db
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - uploads:/app/uploads        
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    extra_hosts:                          
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    command: celery -A app.workers.celery:celery_app worker --loglevel=info --pool=solo
    volumes:
      - .:/app
      - uploads:/app/uploads        
    env_file: .env
    depends_on:
      - db
      - redis

  flower:
    build: .
    command: celery -A app.workers.celery:celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  uploads:                          